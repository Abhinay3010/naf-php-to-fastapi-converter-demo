name: PHP → FastAPI Conversion & Tests

on:
  push:
    branches: [ main ]

jobs:
  convert-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run converter
        run: python -m converter.runner

      - name: Show converted files
        run: ls -l output

      - name: Run tests on generated FastAPI
        run: |
          echo "🚀 Running tests on generated FastAPI files..."
          pytest tests/test_generated_fastapi.py
